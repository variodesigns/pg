<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>

    <style>
        /* Load your custom font */
        @font-face {
            font-family: "Providence Sans Pro";
            src: url("../fonts/providencesansbold.otf") format("opentype");
            font-weight: 700;
            font-style: normal;
        }

        /* Page background */
        body {
            margin: 0;
            padding: 0;
            background: #ebe9dd;
            font-family: "Providence Sans Pro", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        img {
            width: 260px; /* adjust as needed */
            height: auto;
            margin-bottom: 20px;
        }

        .message {
            font-size: 28px;
            color: #ad4100;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <img src="pglogo.jpg" alt="Logo">

    <div class="message">Harry and Beth your website is coming</div>

</body>
</html>
